version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  event-tracker-service:
    build: ./event-tracker-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka

  session-aggregator-service:
    build: ./session-aggregator-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - kafka
      - redis

  recommendation-service:
    build: ./recommendation-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084

  offer-service:
    build: ./offer-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085

  ml-prediction-service:
    build: ./ml-prediction-service
    ports:
      - "8001:8001"

  genai-service:
    build: ./genai-service
    ports:
      - "8002:8002"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}

  ai-orchestrator-service:
    build: ./ai-orchestrator-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      ML_SERVICE_BASE_URL: http://ml-prediction-service:8001
      GENAI_SERVICE_BASE_URL: http://genai-service:8002
      RECOMMENDATION_SERVICE_BASE_URL: http://recommendation-service:8084
      OFFER_SERVICE_BASE_URL: http://offer-service:8085
      SESSION_AGGREGATOR_BASE_URL: http://session-aggregator-service:8082
    depends_on:
      - ml-prediction-service
      - genai-service
      - recommendation-service
      - offer-service
      - session-aggregator-service

  frontend-app:
    build: ./frontend-app
    ports:
      - "3000:3000"
    environment:
      VITE_EVENT_TRACKER_BASE_URL: http://localhost:8081
      VITE_AI_ORCHESTRATOR_BASE_URL: http://localhost:8083
    depends_on:
      - event-tracker-service
      - ai-orchestrator-service
